name: Release

# リリースフロー (pnpm ネイティブの change intent を利用):
#   1. 変更時に `pnpm change` で .changeset/ に intent を記録してマージする
#   2. main に未消費の intent があると、このワークフローが `pnpm version -r` を
#      適用した Release PR (release/main ブランチ) を作成/更新する
#   3. Release PR をマージすると、このワークフローが npm へ OIDC (trusted
#      publishing) 経由で `pnpm stage publish` を実行し、git タグと GitHub
#      Release を作成する
#   4. `pnpm stage publish` はステージング登録のみを行い 2FA を要求しない。
#      実際に npm 上で公開されるには、メンテナが npmjs.com またはローカル
#      CLI (`pnpm stage approve`) で 2FA 認証込みの承認を行う必要がある。
#
# 注意: 初回 publish は npm の仕様上 OIDC では行えないため手動で行うこと。
# 以降は npmjs.com のパッケージ設定で Trusted Publisher (このリポジトリ +
# release.yml) を登録しておくこと。

on:
  push:
    branches: [main]
  workflow_dispatch:

# Release PR の更新と publish が並行しないよう直列化する (キャンセルはしない)
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # release/main ブランチの push と GitHub Release の作成
      pull-requests: write # Release PR の作成・更新
      id-token: write # npm への OIDC publish
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version: "26"
          cache: true
          # frozen-lockfile 付きで明示的にインストールするため、自動インストールは無効化する
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      # 未消費の change intent があるかで「Release PR 更新」か「publish 判定」に分岐する
      - name: Detect pending change intents
        id: plan
        run: |
          if pnpm change status | grep -q "Pending change intents:"; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release PR
        if: steps.plan.outputs.pending == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C release/main

          # intent を消費して version bump + changelog 生成 + ledger 記録を行う
          pnpm version -r

          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          git add -A
          git commit -m "chore: release v$VERSION"
          git push -f origin release/main

          TITLE="chore: release v$VERSION"
          BODY_FILE=$(mktemp)
          {
            echo "このPRをマージすると v$VERSION が npm に publish されます。"
            echo
            cat ".changeset/changelogs/$NAME@$VERSION.md"
          } > "$BODY_FILE"

          PR_NUMBER=$(gh pr list --head release/main --state open --json number --jq '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            gh pr create --head release/main --title "$TITLE" --body-file "$BODY_FILE"
          fi

          {
            echo "## Release PR"
            echo "v$VERSION の Release PR を作成/更新しました。"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check whether current version needs publishing
        if: steps.plan.outputs.pending == 'false'
        id: check
        run: |
          VERSION=$(jq -r '.version' package.json)
          NAME=$(jq -r '.name' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          # Release PR を経ていない version (changelog が無い) は publish しない
          if [ ! -f ".changeset/changelogs/$NAME@$VERSION.md" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "changelog が無いため publish しません (v$VERSION)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 既に npm に存在する version は publish しない
          if pnpm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "v$VERSION は公開済みのため publish しません" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # OIDC (trusted publishing) でステージング登録する。provenance も自動付与される。
      # 2FA は不要だが、実際に npm 上で公開されるにはメンテナによる承認
      # (pnpm stage approve / npmjs.com) が別途必要。
      - name: Stage publish to npm
        if: steps.plan.outputs.pending == 'false' && steps.check.outputs.publish == 'true'
        run: pnpm stage publish --access public --provenance --no-git-checks

      - name: Create GitHub Release
        if: steps.plan.outputs.pending == 'false' && steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
          NAME: ${{ steps.check.outputs.name }}
        run: |
          gh release create "v$VERSION" \
            --target "$GITHUB_SHA" \
            --title "v$VERSION" \
            --notes-file ".changeset/changelogs/$NAME@$VERSION.md"

          {
            echo "## Staged for publishing"
            echo "v$VERSION を npm にステージング登録し、GitHub Release を作成しました。"
            echo
            echo "**npm 上ではまだ非公開です。** 公開するにはメンテナが以下のいずれかで承認 (2FA) してください:"
            echo "- npmjs.com のパッケージページから承認する"
            echo "- ローカルで \`pnpm stage approve $NAME@$VERSION\` を実行する"
          } >> "$GITHUB_STEP_SUMMARY"
